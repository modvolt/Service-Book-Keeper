openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AutoServis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vehicles
    description: Vehicle management
  - name: service-records
    description: Service record management
  - name: work-orders
    description: Work order management
  - name: photos
    description: Photo management
  - name: dashboard
    description: Dashboard summary
  - name: materials
    description: Material catalog and work order materials
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vehicles/catalog/makes:
    get:
      operationId: listVehicleMakes
      tags: [vehicles]
      summary: List known vehicle makes (curated catalog + user history)
      responses:
        "200":
          description: List of makes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /vehicles/catalog/models:
    get:
      operationId: listVehicleModels
      tags: [vehicles]
      summary: List models for a given make
      parameters:
        - name: make
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Create a new vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      summary: List catalog materials
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of catalog materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MaterialCatalogItem"
    post:
      operationId: createMaterial
      tags: [materials]
      summary: Add a material to the catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialCatalogInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaterialCatalogItem"

  /materials/{id}:
    delete:
      operationId: deleteMaterial
      tags: [materials]
      summary: Remove a catalog material
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /work-orders/{id}/materials:
    get:
      operationId: listWorkOrderMaterials
      tags: [materials]
      summary: List materials on a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Materials list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrderMaterial"
    post:
      operationId: addWorkOrderMaterial
      tags: [materials]
      summary: Add a material to a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderMaterialInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrderMaterial"

  /work-order-materials/{id}:
    delete:
      operationId: deleteWorkOrderMaterial
      tags: [materials]
      summary: Remove a material from a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /work-orders/{id}/import-invoice:
    post:
      operationId: importInvoiceForWorkOrder
      tags: [materials]
      summary: Extract materials from a photo of a delivery note or invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvoiceImportInput"
      responses:
        "200":
          description: Extracted materials (suggestions, not persisted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceImportResult"

  /vehicles/import-tp:
    post:
      operationId: importVehicleFromTp
      tags: [vehicles]
      summary: Extract vehicle data from a photo of a Czech technical license (TP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportTpInput"
      responses:
        "200":
          description: Extracted vehicle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTpResult"

  /vehicles/by-plate/{plate}:
    get:
      operationId: getVehicleByPlate
      tags: [vehicles]
      summary: Get vehicle by license plate
      parameters:
        - name: plate
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleDetail"
        "404":
          description: Not found
    patch:
      operationId: updateVehicle
      tags: [vehicles]
      summary: Update vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Delete vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /vehicles/{id}/recompute-status:
    post:
      operationId: recomputeVehicleStatus
      tags: [vehicles]
      summary: Recompute current km and service status from full service history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
        "404":
          description: Not found

  /vehicles/{id}/service-records:
    get:
      operationId: listServiceRecords
      tags: [service-records]
      summary: List service records for a vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServiceRecord"
    post:
      operationId: createServiceRecord
      tags: [service-records]
      summary: Add a service record to a vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceRecordInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRecord"

  /service-records/{id}:
    get:
      operationId: getServiceRecord
      tags: [service-records]
      summary: Get service record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceRecord"
    delete:
      operationId: deleteServiceRecord
      tags: [service-records]
      summary: Delete a service record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /work-orders:
    get:
      operationId: listWorkOrders
      tags: [work-orders]
      summary: List all work orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, waiting_parts, needs_return, completed]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [work-orders]
      summary: Create a new work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /work-orders/{id}:
    get:
      operationId: getWorkOrder
      tags: [work-orders]
      summary: Get work order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Work order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
    patch:
      operationId: updateWorkOrder
      tags: [work-orders]
      summary: Update work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"
    delete:
      operationId: deleteWorkOrder
      tags: [work-orders]
      summary: Delete work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /work-orders/{id}/photos:
    get:
      operationId: listWorkOrderPhotos
      tags: [photos]
      summary: List photos for a work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"

  /photos/{id}:
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments in a date range
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /ares/{ico}:
    get:
      operationId: lookupAres
      tags: [ares]
      summary: Look up company info by IČO in ARES registry
      parameters:
        - name: ico
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AresResult"
        "404":
          description: Not found

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettingsInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary statistics
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Vehicle:
      type: object
      required: [id, licensePlate, make, model, ownerType, createdAt]
      properties:
        id:
          type: integer
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: ["integer", "null"]
        color:
          type: ["string", "null"]
        vin:
          type: ["string", "null"]
        engineDisplacement:
          type: ["integer", "null"]
        registrationDate:
          type: ["string", "null"]
        transmission:
          type: ["string", "null"]
          enum: [manual, automatic, null]
        ownerType:
          type: string
          enum: [private, company]
        ownerName:
          type: ["string", "null"]
        ownerAddress:
          type: ["string", "null"]
        ownerIco:
          type: ["string", "null"]
        ownerDic:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        ownerEmail:
          type: ["string", "null"]
        currentKm:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        stkValidUntil:
          type: ["string", "null"]
        lastOilChangeKm:
          type: ["integer", "null"]
        lastOilChangeDate:
          type: ["string", "null"]
        lastBrakesDate:
          type: ["string", "null"]
        lastTimingDate:
          type: ["string", "null"]
        lastTransmissionOilDate:
          type: ["string", "null"]
        lastTransmissionOilKm:
          type: ["integer", "null"]
        lastBrakeFluidDate:
          type: ["string", "null"]
        oilChangeIntervalKm:
          type: ["integer", "null"]
        oilChangeIntervalMonths:
          type: ["integer", "null"]
        transmissionOilIntervalKm:
          type: ["integer", "null"]
        transmissionOilIntervalMonths:
          type: ["integer", "null"]
        brakesIntervalMonths:
          type: ["integer", "null"]
        timingIntervalKm:
          type: ["integer", "null"]
        timingIntervalMonths:
          type: ["integer", "null"]
        brakeFluidIntervalMonths:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    VehicleDetail:
      type: object
      required: [id, licensePlate, make, model, ownerType, createdAt, serviceRecords, openWorkOrders, completedWorkOrders]
      properties:
        id:
          type: integer
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: ["integer", "null"]
        color:
          type: ["string", "null"]
        vin:
          type: ["string", "null"]
        engineDisplacement:
          type: ["integer", "null"]
        registrationDate:
          type: ["string", "null"]
        transmission:
          type: ["string", "null"]
          enum: [manual, automatic, null]
        ownerType:
          type: string
          enum: [private, company]
        ownerName:
          type: ["string", "null"]
        ownerAddress:
          type: ["string", "null"]
        ownerIco:
          type: ["string", "null"]
        ownerDic:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        ownerEmail:
          type: ["string", "null"]
        currentKm:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        stkValidUntil:
          type: ["string", "null"]
        lastOilChangeKm:
          type: ["integer", "null"]
        lastOilChangeDate:
          type: ["string", "null"]
        lastBrakesDate:
          type: ["string", "null"]
        lastTimingDate:
          type: ["string", "null"]
        lastTransmissionOilDate:
          type: ["string", "null"]
        lastTransmissionOilKm:
          type: ["integer", "null"]
        lastBrakeFluidDate:
          type: ["string", "null"]
        oilChangeIntervalKm:
          type: ["integer", "null"]
        oilChangeIntervalMonths:
          type: ["integer", "null"]
        transmissionOilIntervalKm:
          type: ["integer", "null"]
        transmissionOilIntervalMonths:
          type: ["integer", "null"]
        brakesIntervalMonths:
          type: ["integer", "null"]
        timingIntervalKm:
          type: ["integer", "null"]
        timingIntervalMonths:
          type: ["integer", "null"]
        brakeFluidIntervalMonths:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        serviceRecords:
          type: array
          items:
            $ref: "#/components/schemas/ServiceRecord"
        openWorkOrders:
          type: array
          items:
            $ref: "#/components/schemas/WorkOrder"
        completedWorkOrders:
          type: array
          items:
            $ref: "#/components/schemas/WorkOrder"

    VehicleInput:
      type: object
      required: [licensePlate, make, model]
      properties:
        licensePlate:
          type: string
          minLength: 1
        make:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1
        year:
          type: ["integer", "null"]
        color:
          type: ["string", "null"]
        vin:
          type: ["string", "null"]
        engineDisplacement:
          type: ["integer", "null"]
        registrationDate:
          type: ["string", "null"]
        transmission:
          type: ["string", "null"]
          enum: [manual, automatic, null]
        ownerType:
          type: ["string", "null"]
          enum: [private, company, null]
        ownerName:
          type: ["string", "null"]
        ownerAddress:
          type: ["string", "null"]
        ownerIco:
          type: ["string", "null"]
        ownerDic:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        ownerEmail:
          type: ["string", "null"]
        currentKm:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        stkValidUntil:
          type: ["string", "null"]
        lastOilChangeKm:
          type: ["integer", "null"]
        lastOilChangeDate:
          type: ["string", "null"]
        lastBrakesDate:
          type: ["string", "null"]
        lastTimingDate:
          type: ["string", "null"]
        lastTransmissionOilDate:
          type: ["string", "null"]
        lastTransmissionOilKm:
          type: ["integer", "null"]
        lastBrakeFluidDate:
          type: ["string", "null"]
        oilChangeIntervalKm:
          type: ["integer", "null"]
        oilChangeIntervalMonths:
          type: ["integer", "null"]
        transmissionOilIntervalKm:
          type: ["integer", "null"]
        transmissionOilIntervalMonths:
          type: ["integer", "null"]
        brakesIntervalMonths:
          type: ["integer", "null"]
        timingIntervalKm:
          type: ["integer", "null"]
        timingIntervalMonths:
          type: ["integer", "null"]
        brakeFluidIntervalMonths:
          type: ["integer", "null"]

    VehicleUpdate:
      type: object
      properties:
        licensePlate:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: ["integer", "null"]
        color:
          type: ["string", "null"]
        vin:
          type: ["string", "null"]
        engineDisplacement:
          type: ["integer", "null"]
        registrationDate:
          type: ["string", "null"]
        transmission:
          type: ["string", "null"]
          enum: [manual, automatic, null]
        ownerType:
          type: ["string", "null"]
          enum: [private, company, null]
        ownerName:
          type: ["string", "null"]
        ownerAddress:
          type: ["string", "null"]
        ownerIco:
          type: ["string", "null"]
        ownerDic:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        ownerEmail:
          type: ["string", "null"]
        currentKm:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        stkValidUntil:
          type: ["string", "null"]
        lastOilChangeKm:
          type: ["integer", "null"]
        lastOilChangeDate:
          type: ["string", "null"]
        lastBrakesDate:
          type: ["string", "null"]
        lastTimingDate:
          type: ["string", "null"]
        lastTransmissionOilDate:
          type: ["string", "null"]
        lastTransmissionOilKm:
          type: ["integer", "null"]
        lastBrakeFluidDate:
          type: ["string", "null"]
        oilChangeIntervalKm:
          type: ["integer", "null"]
        oilChangeIntervalMonths:
          type: ["integer", "null"]
        transmissionOilIntervalKm:
          type: ["integer", "null"]
        transmissionOilIntervalMonths:
          type: ["integer", "null"]
        brakesIntervalMonths:
          type: ["integer", "null"]
        timingIntervalKm:
          type: ["integer", "null"]
        timingIntervalMonths:
          type: ["integer", "null"]
        brakeFluidIntervalMonths:
          type: ["integer", "null"]

    ServiceRecord:
      type: object
      required: [id, vehicleId, date, createdAt]
      properties:
        id:
          type: integer
        vehicleId:
          type: integer
        date:
          type: string
        km:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
        oilChanged:
          type: boolean
        brakesServiced:
          type: boolean
        timingServiced:
          type: boolean
        transmissionOilChanged:
          type: boolean
        brakeFluidChanged:
          type: boolean
        stkPassed:
          type: boolean
        otherWork:
          type: ["string", "null"]
        technician:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ServiceRecordInput:
