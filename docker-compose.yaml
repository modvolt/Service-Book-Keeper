# AutoServis — production deployment (Coolify / Hetzner or any Docker host).
# Copy .env.example to .env, fill in the values, then: docker compose up -d --build
#
# Coolify: point a "Docker Compose" resource at this file. Coolify provides the
# HTTPS reverse proxy in front of the `app` service (port 8080) and injects the
# environment variables you configure in its UI.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoservis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-autoservis}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autoservis} -d ${POSTGRES_DB:-autoservis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      # The app talks to the bundled Postgres over the compose network.
      DATABASE_URL: postgres://${POSTGRES_USER:-autoservis}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-autoservis}

      # --- Auth / session ---
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      APP_PASSWORD: ${APP_PASSWORD:?set APP_PASSWORD in .env}
      # Public HTTPS origin (used to build password-reset links). e.g. https://autoservis.example.com
      APP_URL: ${APP_URL:-}
      # Comma-separated CORS allowlist. Single-origin deploy needs none; leave empty.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # --- Photo storage (S3-compatible, e.g. Hetzner Object Storage) ---
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_PRIVATE_PREFIX: ${S3_PRIVATE_PREFIX:-private}
      S3_PUBLIC_PREFIX: ${S3_PUBLIC_PREFIX:-public}

      # --- AI (OpenAI or any OpenAI-compatible endpoint) ---
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_INTEGRATIONS_OPENAI_API_KEY: ${AI_INTEGRATIONS_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}

      # --- E-mail (optional; reminders/reset stay inert if unset) ---
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-}
    expose:
      # Do NOT publish to a host port under Coolify: its reverse proxy reaches the
      # container over the internal `coolify` network and routes by domain. Binding
      # a host port (e.g. 0.0.0.0:8080) collides with Coolify's own proxy and fails
      # with "port is already allocated". `expose` makes 8080 reachable to the proxy
      # without taking a host port. (For a plain `docker compose up` without Coolify,
      # add a `ports: ["8080:8080"]` mapping instead.)
      - "8080"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:8080/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  db-data:
