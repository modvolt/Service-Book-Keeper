kind = "web"
previewPath = "/"
title = "AutoServis"
version = "1.0.0"
id = "artifacts/autoservis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19341

[services.development]
run = "pnpm --filter @workspace/autoservis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autoservis", "run", "build" ]
publicDir = "artifacts/autoservis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19341"
BASE_PATH = "/"
