<!DOCTYPE html>
<html lang="cs" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- Disable browser auto-translation. Google Translate / Edge rewrite text
         nodes into <font> wrappers, which then breaks React's DOM reconciliation
         with "insertBefore/removeChild ... is not a child of this node" crashes
         (most visible on the calendar's changing day names and dates). -->
    <meta name="google" content="notranslate" />
    <title>AutoServis</title>
    <meta name="description" content="Správa autoservisu — vozidla, zakázky a servisní historie." />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="AutoServis" />
    <meta property="og:description" content="Správa autoservisu — vozidla, zakázky a servisní historie." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AutoServis" />
    <meta name="twitter:description" content="Správa autoservisu — vozidla, zakázky a servisní historie." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root" class="notranslate"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
